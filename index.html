<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 私人站台:不允許任何搜尋引擎索引、跟隨或快取,僅供知道網址者使用 -->
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="referrer" content="no-referrer">
<title>盤口數據分析站 | 賭球情報・盤口走勢</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
<link rel="stylesheet" href="assets/css/style.css?v=15">
</head>
<body>

<!-- 假登入閘門:僅為入口儀式,非真正的存取控制 -->
<div id="loginGate" class="login-gate">
  <div class="login-card">
    <div class="login-icon">🔒</div>
    <h2>會員登入</h2>
    <p>本站為私人數據分析站,請輸入密碼進入。</p>
    <form id="loginForm" class="login-form">
      <input type="password" id="loginPw" placeholder="密碼" autocomplete="off" autofocus>
      <button type="submit">進入</button>
    </form>
    <p class="login-err" id="loginErr" hidden>密碼錯誤,請再試一次。</p>
  </div>
</div>
<script>
(function () {
  var KEY = "gateOk";
  var gate = document.getElementById("loginGate");
  function unlock() {
    gate.hidden = true;
    document.documentElement.classList.remove("gate-locked");
  }
  var ok = false;
  try { ok = sessionStorage.getItem(KEY) === "1"; } catch (e) {}
  if (ok) { unlock(); return; }
  document.documentElement.classList.add("gate-locked");
  document.getElementById("loginForm").addEventListener("submit", function (e) {
    e.preventDefault();
    if (document.getElementById("loginPw").value === "0") {
      try { sessionStorage.setItem(KEY, "1"); } catch (err) {}
      unlock();
    } else {
      document.getElementById("loginErr").hidden = false;
      document.getElementById("loginPw").value = "";
      document.getElementById("loginPw").focus();
    }
  });
})();
</script>

<header class="site-header">
  <div class="header-inner">
    <div class="brand">
      <span class="brand-icon">📈</span>
      <div class="brand-text">
        <h1>盤口數據分析站</h1>
        <p class="subtitle">MLB・NBA・WNBA|賠率、盤口動向與賭球數據</p>
      </div>
    </div>
    <div class="header-actions">
      <span class="updated-at" id="updatedAt">尚未更新</span>
      <a class="icon-btn nav-link" href="picks.html" title="今日推薦 TOP 5" aria-label="今日推薦 TOP 5">🎯</a>
      <a class="icon-btn nav-link" href="line-direction.html" title="盤口方向" aria-label="盤口方向">📈</a>
      <button class="icon-btn" id="refreshBtn" title="立即重新整理" aria-label="立即重新整理">⟳</button>
      <button class="icon-btn" id="notifBtn" title="比分變動桌面通知" aria-label="比分變動桌面通知">🔕</button>
      <button class="icon-btn" id="themeBtn" title="切換深淺色" aria-label="切換深淺色">🌙</button>
    </div>
  </div>
</header>

<nav class="toolbar">
  <div class="toolbar-inner">
    <div class="league-tabs" id="leagueTabs">
      <button class="tab active" data-league="all">全部</button>
      <button class="tab" data-league="mlb">MLB</button>
      <button class="tab" data-league="nba">NBA</button>
      <button class="tab" data-league="wnba">WNBA</button>
    </div>
    <div class="date-nav">
      <button class="icon-btn small" id="prevDay" aria-label="前一天">‹</button>
      <button class="date-label" id="dateLabel">今天</button>
      <button class="icon-btn small" id="nextDay" aria-label="後一天">›</button>
    </div>
  </div>
</nav>

<main id="content" class="content">
  <!-- league sections injected by JS -->
</main>

<footer class="site-footer">
  <p>資料來源:MLB Stats API、ESPN、TheSportsDB。賠率為 ESPN 合作數據供應商提供之美式盤,盤口走勢為本站每 20 分鐘自動採樣。</p>
  <p>本站為賭球數據分析工具,提供隱含機率、盤口動向與市場資金流向等資訊,僅供研究參考,不構成投注建議。請遵守所在地法規、理性投注,未滿 18 歲請勿使用。</p>
</footer>

<div id="modal" class="modal hidden" aria-hidden="true">
  <div class="modal-backdrop" id="modalBackdrop"></div>
  <div class="modal-panel" role="dialog" aria-modal="true">
    <button class="modal-close" id="modalClose" aria-label="關閉">✕</button>
    <div id="modalBody" class="modal-body"></div>
  </div>
</div>

<script src="assets/js/app.js?v=11"></script>
</body>
</html>
