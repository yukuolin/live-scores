name: Collect odds snapshots

on:
  schedule:
    # every 20 minutes; GitHub may delay scheduled runs by a few minutes
    - cron: "*/20 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-odds
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Collect odds
        run: node scripts/collect-odds.js

      - name: Commit and push if changed
        run: |
          git config user.name "odds-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/odds
          if git diff --cached --quiet; then
            echo "No odds changes."
            exit 0
          fi
          git commit -m "odds: snapshot $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git pull --rebase origin main
          git push origin main
